name: Update README Stats

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly on Sunday at midnight UTC
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  update-profile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches all history for accurate commit stats

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Aligns with your Data Engineer stack

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas # Add any other libraries your script needs

      - name: Run the data extraction script
        run: python update_stats.py
        env:
          # This token is automatically provided by GitHub to authenticate API calls
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "⚡ auto-update: refreshed profile stats and AI insights" || exit 0
          git push
